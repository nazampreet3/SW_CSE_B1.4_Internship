<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSL colors</title>
    <style>
       
        p{    
            /* 0 - 255 */
            color: hsl(276, 99%, 49%);
            font-size: x-large;
        }
        h1{
            /* Transparency: 0 - 1 */
            color: hsl(43, 99%, 49%,0.6);
        }
    </style>
</head>
<body>
    <p>Paragraph</p>
    <h1>Heading 1</h1>
   
</body>
</html>
