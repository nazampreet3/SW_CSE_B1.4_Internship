<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio tag</title>
</head>
<body>
    <audio src="sample-3s.mp3" controls>Your browser does not support the audio tag</audio>
    <audio src="sample-3s.mp3" autoplay controls>Your browser does not support the audio tag</audio>
    <audio src="sample-3s.mp3" autoplay muted>Your browser does not support the audio tag</audio>
    <audio src="sample-3s.mp3" loop controls>Your browser does not support the audio tag</audio>
    <audio src="sample-3s.mp3" preload="none" controls>
        Your browser does not support the video tag
    </audio>
</body>
</html>
