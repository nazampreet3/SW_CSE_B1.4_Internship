<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image tag</title>
    <style>
        .responsive-image {
            max-width:100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <img src="20250307.jpg" alt="Could not find the image">
    <img src="images/20250307.jpg" alt="Could not find the image"> 
    
    <!-- Common attributes & variations -->
     <!-- Width & height -->
    <img src="20250307.jpg" alt="Could not find the image" width="200px" height="100px"> 
    <!-- Tooltip -->
    <img src="20250307.jpg" alt="Could not find the image" title="Image of a Dog"> 
    <!-- Style -->
    <img src="20250307.jpg" alt="Could not find the image" 
    style="width:200px; height:100px; border-radius:10%; border:2px solid #cd2323;"> 
    <img src="20250307.jpg" alt="Could not find the image" class="responsive-image"> 


     
</body>
</html>
